<!DOCTYPE html>
<html lang="en">
<head>
  <title>Laimwn Store - Register</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#f8f1e7,#f5e6d3);
      overflow:hidden;
      position:relative;
    }

   .logo img{
  width:100px;
  height:100px;
  position:absolute;
  top:15px;
  right:20px;   

  display:flex;
  align-items:center;
  gap:8px;
}

    @keyframes slideLeft{
      from{
        opacity:0;
        transform:translateX(50px);
      }
      to{
        opacity:1;
        transform:translateX(0);
      }
    }

    /* Animated Background Circles */
    .circle{
      position:absolute;
      border-radius:50%;
      background:rgba(255,255,255,0.25);
      animation:float 6s infinite ease-in-out;
    }

    .circle:nth-child(1){
      width:220px;
      height:220px;
      top:8%;
      left:10%;
    }

    .circle:nth-child(2){
      width:160px;
      height:160px;
      bottom:12%;
      right:10%;
      animation-duration:8s;
    }

    .circle:nth-child(3){
      width:110px;
      height:110px;
      bottom:18%;
      left:18%;
      animation-duration:5s;
    }

    @keyframes float{
      0%,100%{
        transform:translateY(0px);
      }
      50%{
        transform:translateY(-25px);
      }
    }

    /* Register Box */
    .register-box{
      width:380px;
      background:rgba(255,250,243,0.92);
      backdrop-filter:blur(10px);
      padding:40px;
      border-radius:20px;
      box-shadow:0 8px 25px rgba(0,0,0,0.15);
      text-align:center;
      position:relative;
      z-index:1;

      animation:slideUp 1.5s ease;
    }

    @keyframes slideUp{
      from{
        opacity:0;
        transform:translateY(50px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    .register-box h2{
      margin-bottom:25px;
      color:#6b4f3b;
      animation:fadeIn 2s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
      }
      to{
        opacity:1;
      }
    }

    .input-box{
      margin-bottom:18px;
      text-align:left;
    }

    .input-box label{
      display:block;
      margin-bottom:6px;
      color:#5c4633;
      font-size:14px;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:1px solid #d8c3a5;
      border-radius:10px;
      outline:none;
      background:#fff;
      transition:0.3s;
    }

    .input-box input:focus{
      border-color:#b08968;
      transform:scale(1.03);
      box-shadow:0 0 10px rgba(176,137,104,0.3);
    }

    .register-btn{
      width:100%;
      padding:12px;
      background:#d4a373;
      color:white;
      border:none;
      border-radius:10px;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
      margin-top:5px;
    }

    .register-btn:hover{
      background:#b07d52;
      transform:translateY(-3px);
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
    }

    .extra{
      margin-top:15px;
      font-size:14px;
      color:#6b4f3b;
    }

    .extra a{
      color:#a47148;
      text-decoration:none;
    }

    .extra a:hover{
      text-decoration:underline;
    }

  </style>
</head>
<body>

  <div class="logo">
  <img src="logo.jpeg" alt="Logo">
</div>

 
  <div class="circle"></div>
  <div class="circle"></div>
  <div class="circle"></div>

  
  <div class="register-box">
    <h2>Create Account</h2>

    <form>

      <div class="input-box">
        <label>Full Name</label>
        <input type="text" placeholder="Enter your full name">
      </div>

      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Enter your email">
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Create password">
      </div>

      <div class="input-box">
        <label>Confirm Password</label>
        <input type="password" placeholder="Confirm password">
      </div>

      <button type="submit" class="register-btn">
        Register
      </button>

      <div class="extra">
        Already have an account?
        <a href="login.html">Login</a>
      </div>

    </form>
  </div>

</body>
</html>
